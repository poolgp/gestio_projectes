<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemple d'innerHTML i document.write()</title>
</head>

<body>
    <h1 id="greeting">Hola!</h1>
    <script>
        document.getElementById("greeting").innerHTML = "Hola, usuari! Benvingut/da!";

        document.write("<p>Aquest text ha estat escrit amb document.write().</p>");
    </script>
</body>

</html>
